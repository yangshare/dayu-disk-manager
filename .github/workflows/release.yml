name: Release (Windows)

# 推送 tag 时自动构建 Windows 安装包并发布到 GitHub Releases。
# 在 Actions 页面手动重发时，必须输入一个已存在的 tag。
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要重新发布的既有 tag（例如 v0.1.2）'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Determine Version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$RELEASE_TAG"
          else
            VERSION="$GITHUB_REF_NAME"
          fi
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag 必须是 v 前缀的语义化版本（例如 v0.1.2），实际为: $VERSION"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$VERSION" > /dev/null; then
            echo "::error::tag 不存在: $VERSION"
            exit 1
          fi
          APP_VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "Resolved release version: $VERSION (app version: $APP_VERSION)"

      - name: Set Tauri bundle version
        shell: bash
        run: |
          # Tauri uses tauri.conf.json to name installers and set Windows file metadata.
          # Keep the repository configuration untouched while making the pushed tag canonical.
          printf '{"version":"%s"}\n' "$APP_VERSION" > src-tauri/tauri.release.conf.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app and upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.VERSION }}
          releaseName: '大禹磁盘管理器 ${{ env.VERSION }}'
          releaseBody: '请下载对应的 .msi 或 .exe 安装包。'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.release.conf.json

      - name: Upload update files to Qiniu
        shell: bash
        run: node scripts/upload-qiniu.js "$APP_VERSION" src-tauri/target/x86_64-pc-windows-msvc/release/bundle
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
          QINIU_BUCKET_DOMAIN: ${{ secrets.QINIU_BUCKET_DOMAIN }}
          QINIU_ZONE: ${{ secrets.QINIU_ZONE }}
          QINIU_ACCELERATE_UPLOADING: ${{ secrets.QINIU_ACCELERATE_UPLOADING }}
